# =====================================================
# Expense Tracker - Application Configuration
# College Mini Project
# =====================================================

spring.application.name=expense-tracker
server.port=8080

# =====================================================
# H2 Embedded Database (File Mode - persists data)
# db file saved at: ./data/expensetracker.mv.db
# =====================================================
spring.datasource.url=jdbc:h2:file:./data/expensetracker;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Web Console - visit http://localhost:8080/h2-console to inspect DB
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Run schema.sql on every startup (CREATE IF NOT EXISTS keeps it safe)
spring.sql.init.mode=always

# Session timeout: 60 minutes
server.servlet.session.timeout=60m

# Logging
logging.level.com.expense=DEBUG
